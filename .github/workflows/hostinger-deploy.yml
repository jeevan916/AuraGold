name: Deploy to Hostinger via FTP

on:
  push:
    branches:
      - main # Trigger on pushes to the main branch
  workflow_dispatch: # Allows you to manually trigger the deployment from GitHub Actions tab

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Upgraded from 20 to avoid deprecation warnings

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Inject Database Credentials
        run: |
          sed -i "s|YOUR_DATABASE_PASSWORD|${{ secrets.DB_PASSWORD }}|g" ./dist/api/contact.php
          sed -i "s|YOUR_DATABASE_PASSWORD|${{ secrets.DB_PASSWORD }}|g" ./dist/api/get_contacts.php
          sed -i "s|YOUR_ADMIN_PASSWORD|${{ secrets.ADMIN_PASSWORD }}|g" ./dist/api/get_contacts.php

      - name: Sync React build to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/ # Uploads only the compiled files
          server-dir: /public_html/ # Target the public_html folder
          protocol: ftp # Try explicitly setting protocol
          port: 21
          timeout: 600000 # Increase timeout to prevent control socket drops
